openapi: 3.0.3

info:
  title: MedaVida API
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Local development

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Auth ──────────────────────────────────────────────────────────────────

    SignupRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        firstName:
          type: string
        lastName:
          type: string

    SigninRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    TokenResponse:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string

    SignoutRequest:
      type: object
      required: [refresh]
      properties:
        refresh:
          type: string

    # ── User ─────────────────────────────────────────────────────────────────

    PracticeRef:
      type: object
      description: Minimal practice reference nested inside a Profile
      properties:
        id:
          type: string
          format: uuid
          readOnly: true

    Profile:
      type: object
      properties:
        credit_count:
          type: integer
        practice:
          $ref: '#/components/schemas/PracticeRef'
          nullable: true

    UserAPIKey:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        key:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        profile:
          $ref: '#/components/schemas/Profile'
        api_keys:
          $ref: '#/components/schemas/UserAPIKey'

    UserUpdateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string

    UserDeleteRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          format: password

    # ── Report Requests ───────────────────────────────────────────────────────

    ReportRequestStatus:
      type: string
      enum: [PENDING, RUNNING, PROCESSING, COMPLETE, FAILED]

    ReportRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        postal_code:
          type: string
          maxLength: 20
        ssn:
          type: string
          maxLength: 11
        ein:
          type: string
          maxLength: 10
        id_type:
          type: string
          enum: [SSN, EIN]
        status:
          $ref: '#/components/schemas/ReportRequestStatus'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    ReportRequestCreateRequest:
      type: object
      required: [first_name, last_name, id_type]
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        postal_code:
          type: string
          maxLength: 20
        ssn:
          type: string
          maxLength: 11
        ein:
          type: string
          maxLength: 10
        id_type:
          type: string
          enum: [SSN, EIN]

    # ── Products ──────────────────────────────────────────────────────────────

    StripePrice:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        lookup_key:
          type: string

    # ── Checkout ─────────────────────────────────────────────────────────────

    CreateCheckoutRequest:
      type: object
      required: [lookup_key]
      properties:
        lookup_key:
          type: string

    CreateCheckoutResponse:
      type: object
      properties:
        sessionId:
          type: string
        url:
          type: string
          format: uri

    CheckoutStatusResponse:
      type: object
      properties:
        status:
          type: string
        customer_email:
          type: string
          format: email

    # ── Credentials ───────────────────────────────────────────────────────────

    CredentialWriteRequest:
      type: object
      properties:
        license_number:
          type: string
          maxLength: 100
        enumeration_date:
          type: string
          format: date
          nullable: true
        expiration_date:
          type: string
          format: date
          nullable: true
        file:
          type: string
          format: binary
          nullable: true

    NpiCredential:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        license_number:
          type: string
          maxLength: 100
        last_checked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        enumeration_date:
          type: string
          format: date
          nullable: true
        expiration_date:
          type: string
          format: date
          nullable: true
        file:
          type: string
          format: uri
          nullable: true

    DeaCredential:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        license_number:
          type: string
          maxLength: 100
        last_checked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        enumeration_date:
          type: string
          format: date
          nullable: true
        expiration_date:
          type: string
          format: date
          nullable: true
        file:
          type: string
          format: uri
          nullable: true

    # ── Practices ─────────────────────────────────────────────────────────────

    ProviderByPracticeRef:
      type: object
      description: Represents a ProviderByPractice relationship record
      properties:
        practice:
          type: string
          format: uuid
        type:
          type: string
          enum: [default, medical_director]

    VerificationStatus:
      type: string
      nullable: true
      enum: [running, verified, failed]

    ProviderSummary:
      type: object
      description: Flat provider representation used when nested inside a Practice
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
        phone_number:
          type: string
          maxLength: 20
        title:
          type: string
          maxLength: 100
        specialty:
          type: string
          maxLength: 255
        requires_npi:
          type: boolean
          readOnly: true
        requires_dea:
          type: boolean
          readOnly: true

    Provider:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
        phone_number:
          type: string
          maxLength: 20
        title:
          type: string
          maxLength: 100
          default: Uncredentialed
        specialty:
          type: string
          maxLength: 255
        ssn:
          type: string
          maxLength: 9
        zip_code:
          type: string
          maxLength: 10
        provider_practices:
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/ProviderByPracticeRef'
        npi_credential:
          readOnly: true
          nullable: true
          allOf:
            - $ref: '#/components/schemas/NpiCredential'
        dea_credential:
          readOnly: true
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DeaCredential'
        requires_npi:
          type: boolean
          readOnly: true
          description: True if the provider's title is MD
        requires_dea:
          type: boolean
          readOnly: true
          description: True if the provider's title is MD
        npi_verification_status:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/VerificationStatus'
        dea_verification_status:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/VerificationStatus'

    ProviderWriteRequest:
      type: object
      required: [first_name, last_name, email, phone_number, title, specialty]
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
        phone_number:
          type: string
          maxLength: 20
        title:
          type: string
          maxLength: 100
        specialty:
          type: string
          maxLength: 255
        ssn:
          type: string
          maxLength: 9
        zip_code:
          type: string
          maxLength: 10

    Practice:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        phone_number:
          type: string
          maxLength: 20
        tax_id:
          type: string
          maxLength: 20
        npi_number:
          type: string
          maxLength: 10
        default_providers:
          type: array
          readOnly: true
          description: Providers linked to this practice with type "default"
          items:
            $ref: '#/components/schemas/ProviderSummary'
        medical_director_providers:
          type: array
          readOnly: true
          description: Providers linked to this practice with type "medical_director"
          items:
            $ref: '#/components/schemas/ProviderSummary'

    PracticeWriteRequest:
      type: object
      required: [name, email, phone_number, tax_id, npi_number]
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        phone_number:
          type: string
          maxLength: 20
        tax_id:
          type: string
          maxLength: 20
        npi_number:
          type: string
          maxLength: 10

    PracticeProviderCreateRequest:
      type: object
      description: >
        All fields are optional. The practice is identified by the URL path.
        An empty body is valid and creates a provider with blank defaults.
        Use the `type` field to set the relationship type (defaults to "default").
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
        phone_number:
          type: string
          maxLength: 20
        title:
          type: string
          maxLength: 100
        specialty:
          type: string
          maxLength: 255
        type:
          type: string
          enum: [default, medical_director]
          default: default

    # ── Errors ────────────────────────────────────────────────────────────────

    Error:
      type: object
      properties:
        error:
          type: string

paths:

  # ── Auth ───────────────────────────────────────────────────────────────────

  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Create a new user account
      description: >
        Creates a User, a Profile, and a new Practice record seeded with
        the user's name and email. The Practice ID is accessible via
        the profile object returned from GET /api/v1/users/me.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created — returns JWT tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/signin:
    post:
      tags: [Auth]
      summary: Sign in and receive JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SigninRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/signout:
    post:
      tags: [Auth]
      summary: Sign out and blacklist the refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignoutRequest'
      responses:
        '201':
          description: Signed out successfully

  # ── Users ──────────────────────────────────────────────────────────────────

  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Retrieve the authenticated user's profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

    patch:
      tags: [Users]
      summary: Update the authenticated user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized

    delete:
      tags: [Users]
      summary: Delete the authenticated user's account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDeleteRequest'
      responses:
        '204':
          description: Account deleted
        '400':
          description: Incorrect password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized

  /api/v1/users/me/dashboard:
    get:
      tags: [Users]
      summary: Retrieve the authenticated user's dashboard data
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  # ── Report Requests ────────────────────────────────────────────────────────

  /api/v1/report-requests/:
    get:
      tags: [Report Requests]
      summary: List all report requests
      responses:
        '200':
          description: List of report requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReportRequest'
        '401':
          description: Unauthorized

    post:
      tags: [Report Requests]
      summary: Create a new report request
      description: >
        Creates a report request and asynchronously triggers the
        run_reports_dag Celery task via the post_save signal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequestCreateRequest'
      responses:
        '201':
          description: Report request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportRequest'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized

  /api/v1/report-requests/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      tags: [Report Requests]
      summary: Retrieve a report request
      responses:
        '200':
          description: Report request detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportRequest'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    patch:
      tags: [Report Requests]
      summary: Partially update a report request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequestCreateRequest'
      responses:
        '200':
          description: Updated report request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportRequest'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    delete:
      tags: [Report Requests]
      summary: Delete a report request
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found

  # ── Products ───────────────────────────────────────────────────────────────

  /api/v1/products/:
    get:
      tags: [Products]
      summary: List available subscription pricing plans
      responses:
        '200':
          description: List of Stripe prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StripePrice'
        '401':
          description: Unauthorized

  # ── Checkout ───────────────────────────────────────────────────────────────

  /api/v1/checkout/create-checkout-session:
    post:
      tags: [Checkout]
      summary: Create a Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutRequest'
      responses:
        '200':
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCheckoutResponse'
        '400':
          description: Stripe error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized

  /api/v1/checkout/session-status:
    get:
      tags: [Checkout]
      summary: Retrieve the status of a Stripe checkout session
      parameters:
        - name: session_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Checkout session status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutStatusResponse'
        '401':
          description: Unauthorized

  /api/v1/checkout/session-status/webhook:
    post:
      tags: [Checkout]
      summary: Stripe webhook receiver
      description: >
        Handles `checkout.session.completed` and
        `checkout.session.async_payment_succeeded` events to activate
        user subscriptions. Endpoint is public — Stripe signature
        verification is performed server-side.
      security: []
      parameters:
        - name: stripe-signature
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe event payload
      responses:
        '200':
          description: Event processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Invalid payload or signature verification failed

  # ── API Keys ───────────────────────────────────────────────────────────────

  /api/v1/api-keys/:
    get:
      tags: [API Keys]
      summary: Retrieve the authenticated user's API key
      responses:
        '200':
          description: API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAPIKey'
        '401':
          description: Unauthorized

    patch:
      tags: [API Keys]
      summary: Update the authenticated user's API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAPIKey'
      responses:
        '200':
          description: Updated API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAPIKey'
        '401':
          description: Unauthorized

  # ── Practices ──────────────────────────────────────────────────────────────

  /api/v1/practices/:
    get:
      tags: [Practices]
      summary: List all practices
      responses:
        '200':
          description: List of practices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Practice'
        '401':
          description: Unauthorized

    post:
      tags: [Practices]
      summary: Create a new practice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PracticeWriteRequest'
      responses:
        '201':
          description: Practice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Practice'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized

  /api/v1/practices/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Practices]
      summary: Retrieve a practice
      responses:
        '200':
          description: Practice detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Practice'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    put:
      tags: [Practices]
      summary: Replace a practice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PracticeWriteRequest'
      responses:
        '200':
          description: Updated practice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Practice'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    patch:
      tags: [Practices]
      summary: Partially update a practice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PracticeWriteRequest'
      responses:
        '200':
          description: Updated practice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Practice'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    delete:
      tags: [Practices]
      summary: Delete a practice
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found

  # ── Providers ──────────────────────────────────────────────────────────────

  /api/v1/providers/:
    get:
      tags: [Providers]
      summary: List all providers
      responses:
        '200':
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Provider'
        '401':
          description: Unauthorized

    post:
      tags: [Providers]
      summary: Create a new provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderWriteRequest'
      responses:
        '201':
          description: Provider created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized

  /api/v1/providers/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Providers]
      summary: Retrieve a provider
      responses:
        '200':
          description: Provider detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    put:
      tags: [Providers]
      summary: Replace a provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderWriteRequest'
      responses:
        '200':
          description: Updated provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    patch:
      tags: [Providers]
      summary: Partially update a provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderWriteRequest'
      responses:
        '200':
          description: Updated provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    delete:
      tags: [Providers]
      summary: Delete a provider
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found

  # ── Provider Titles ────────────────────────────────────────────────────────

  /api/v1/provider-titles:
    get:
      tags: [Providers]
      summary: List all available provider titles
      description: >
        Returns a constant list of recognized provider title codes and their
        descriptions. This list does not change at runtime.
      responses:
        '200':
          description: List of provider titles
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      readOnly: true
                    title:
                      type: string
                      example: Uncredentialed
                    summary:
                      type: string
                      example: Uncredentialed Provider
        '401':
          description: Unauthorized

  # ── Nested: Practice Providers ─────────────────────────────────────────────

  /api/v1/practice/{practice_id}/providers/:
    parameters:
      - name: practice_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      tags: [Providers]
      summary: Create a provider and associate it with a practice
      description: >
        Creates a new Provider linked to the Practice identified by
        `practice_id`. All body fields are optional — an empty body
        creates a provider with blank defaults.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PracticeProviderCreateRequest'
      responses:
        '201':
          description: Provider created and linked to the practice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '404':
          description: Practice not found

  # ── Nested: Provider Credentials ───────────────────────────────────────────

  /api/v1/providers/{provider_id}/npi-credentials/:
    parameters:
      - name: provider_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      tags: [Providers]
      summary: Create an NPI credential for a provider
      description: >
        Creates a new NpiCredential and links it to the Provider identified
        by `provider_id`. The `last_checked_at` field is read-only and
        managed server-side.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CredentialWriteRequest'
      responses:
        '201':
          description: NPI credential created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NpiCredential'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '404':
          description: Provider not found

  /api/v1/providers/{provider_id}/dea-credentials/:
    parameters:
      - name: provider_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      tags: [Providers]
      summary: Create a DEA credential for a provider
      description: >
        Creates a new DeaCredential and links it to the Provider identified
        by `provider_id`. The `last_checked_at` field is read-only and
        managed server-side.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CredentialWriteRequest'
      responses:
        '201':
          description: DEA credential created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeaCredential'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '404':
          description: Provider not found

  /api/v1/providers/{provider_id}/dea-credentials/certificate/:
    parameters:
      - name: provider_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      tags: [Providers]
      summary: Upload a DEA certificate PDF for a provider
      description: >
        Uploads a DEA certificate PDF to S3, creates a new DeaCredential,
        links it to the Provider, and asynchronously dispatches the
        run_dea_license_extraction Celery task to extract fields from the PDF.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: DEA certificate uploaded and extraction task queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeaCredential'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '404':
          description: Provider not found

  /api/v1/providers/{provider_id}/verify:
    parameters:
      - name: provider_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      tags: [Providers]
      summary: Trigger provider credential verification
      description: >
        Sets `npi_verification_status` and `dea_verification_status` to
        `running`, dispatches the `verify_provider` Celery task, and returns
        the updated Provider immediately. The task asynchronously runs an NPPES
        NPI search and a DEA crawler check, updating the status fields to
        `verified` or `failed` upon completion.
      responses:
        '200':
          description: Verification task queued — returns current provider state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '401':
          description: Unauthorized
        '404':
          description: Provider not found

  # ── NPPES Search ───────────────────────────────────────────────────────────

  /api/v1/nppes/search:
    get:
      tags: [Providers]
      summary: Proxy search against the NPPES NPI Registry API v2.1
      description: >
        Forwards supported query parameters to the NPPES NPI Registry API
        and returns the response unchanged. Unknown parameters are silently
        dropped.
      parameters:
        - name: number
          in: query
          schema:
            type: string
          description: 10-digit NPI number for a direct lookup
        - name: first_name
          in: query
          schema:
            type: string
          description: Individual provider first name (trailing wildcards supported)
        - name: last_name
          in: query
          schema:
            type: string
          description: Individual provider last name (trailing wildcards supported)
        - name: organization_name
          in: query
          schema:
            type: string
          description: Organization name (trailing wildcards supported)
        - name: enumeration_type
          in: query
          schema:
            type: string
            enum: [NPI-1, NPI-2]
          description: NPI-1 for individuals, NPI-2 for organizations
        - name: city
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: postal_code
          in: query
          schema:
            type: string
        - name: country_code
          in: query
          schema:
            type: string
        - name: address_purpose
          in: query
          schema:
            type: string
            enum: [location, mailing, primary, secondary]
        - name: taxonomy_description
          in: query
          schema:
            type: string
        - name: credentials
          in: query
          schema:
            type: string
        - name: sole_proprietor
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1200
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: NPPES search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  result_count:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
        '401':
          description: Unauthorized